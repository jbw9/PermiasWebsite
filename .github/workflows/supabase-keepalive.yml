name: Supabase Keep-Alive

on:
  schedule:
    # Runs every 3 days at 00:00 UTC (well within Supabase's 1-week inactivity limit)
    - cron: "0 0 */3 * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          curl -s \
            -X GET \
            "$SUPABASE_URL/rest/v1/site_content?select=id&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -o /dev/null \
            -w "HTTP status: %{http_code}\n"
        env:
          SUPABASE_URL: ${{ secrets.REACT_APP_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.REACT_APP_SUPABASE_ANON_KEY }}
